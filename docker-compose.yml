version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nail_tryon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8190:8190"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/nail_tryon
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./openclaw:/app/openclaw:ro
      - uploads:/app/uploads
      - results:/app/results
    command: >
      sh -c "OPENCLAW_HOME=/app openclaw gateway run --port 18789 &
             uvicorn app.main:app --host 0.0.0.0 --port 8190 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4180:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  results:
